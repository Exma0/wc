services:
  - type: web
    name: wc                        # wc-tsgd.onrender.com
    runtime: docker
    privileged: true                # swapon + cgroup bypass için zorunlu
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "5000"
      - key: RENDER_DISK_LIMIT_GB
        value: "18.0"
      - key: FORCE_MAIN
        value: "1"
      - key: MAIN_SERVER_URL
        value: "https://wc-tsgd.onrender.com"
      # MC_ONLY artık YOK — panel wc-tsgd.onrender.com'da çalışır
    healthCheckPath: /api/ping
    disk:
      name: minecraft-disk
      mountPath: /minecraft
      sizeGB: 18
    numInstances: 1
