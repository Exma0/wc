services:

  # ══════════════════════════════════════════════════════════════
  #  ANA PROXY  —  wc-tsgd.onrender.com  (bir kere kurulur)
  # ══════════════════════════════════════════════════════════════
  - type: web
    name: wc-tsgd
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: ENGINE_MODE
        value: proxy
      - key: DATA_DIR
        value: /data
    disk:
      name: proxy-state
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /
    autoDeploy: true

  # ══════════════════════════════════════════════════════════════
  #  GAMESERVER  —  yeni sunucu açmak için sadece bu bloğu kopyala
  #  Başka HİÇBİR ŞEY değiştirme — proxy, etiket otomatik ayarlanır
  # ══════════════════════════════════════════════════════════════
  - type: web
    name: wc-gameserver-1
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8080"
    disk:
      name: gs1-world
      mountPath: /server/world
      sizeGB: 1
    healthCheckPath: /
    autoDeploy: true
