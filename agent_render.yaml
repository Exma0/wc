services:
  - type: web
    name: mc-agent
    runtime: docker
    dockerfilePath: ./agent.Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: MAIN_URL
        value: "https://wc-tsgd.onrender.com"
      - key: RAM_CACHE_MB
        value: "380"
        # 512MB toplam - 80MB (Flask+OS) - 36MB buffer = 396MB → 380MB güvenli
      - key: DISK_LIMIT_GB
        value: "10.0"
    healthCheckPath: /health
    disk:
      name: agent-disk
      mountPath: /agent_data
      sizeGB: 10
