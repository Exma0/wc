services:
  - type: web
    name: mc-agent
    runtime: docker
    # Seçenek A: Hafif agent imajı (önerilen)
    dockerfilePath: ./agent.Dockerfile
    # Seçenek B: Ana Dockerfile kullan (IS_MAIN=False → agent modu otomatik)
    # dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: MAIN_URL
        value: "https://wc-tsgd.onrender.com"
      - key: RAM_CACHE_MB
        value: "380"
      - key: DISK_LIMIT_GB
        value: "10.0"
      - key: AGENT_DATA
        value: "/agent_data"
    healthCheckPath: /health
    disk:
      name: agent-disk
      mountPath: /agent_data
      sizeGB: 10
